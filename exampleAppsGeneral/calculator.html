<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Scientific Calculator</title>
<style>
:root {
  --accent: #6c5ce7;
  --accent-glow: rgba(108, 92, 231, 0.35);
  --accent-hover: #7c6ff0;
  --accent-press: #5a4bd4;
  --danger: #ff6b6b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  height: 100vh;
  height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  transition: background 0.6s ease, color 0.4s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ── Dark Theme ──────────────────────────────────── */
body.dark {
  background: linear-gradient(140deg, #0a0a1a 0%, #1a1533 40%, #0d1b2a 100%);
  color: #e8e6f0;
}
body.dark .calc {
  background: rgba(22, 20, 40, 0.88);
  box-shadow: 0 30px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04), inset 0 1px 0 rgba(255,255,255,0.04);
  backdrop-filter: blur(50px) saturate(1.2);
  -webkit-backdrop-filter: blur(50px) saturate(1.2);
}
body.dark .display-area {
  background: rgba(6, 5, 15, 0.55);
  box-shadow: inset 0 3px 12px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.025);
}
body.dark .expr { color: rgba(180, 175, 210, 0.55); }
body.dark .result-text { color: #f0eef8; }
body.dark .btn-num {
  background: rgba(55, 50, 80, 0.55);
  color: #f0eef8;
}
body.dark .btn-num:hover { background: rgba(70, 65, 100, 0.7); }
body.dark .btn-op {
  background: rgba(75, 60, 130, 0.45);
  color: #c4b5ff;
}
body.dark .btn-op:hover { background: rgba(90, 75, 150, 0.6); }
body.dark .btn-fn {
  background: rgba(40, 38, 65, 0.5);
  color: rgba(190, 185, 220, 0.8);
}
body.dark .btn-fn:hover { background: rgba(55, 52, 85, 0.65); }
body.dark .btn-sci {
  background: rgba(35, 33, 60, 0.45);
  color: rgba(170, 165, 205, 0.75);
}
body.dark .btn-sci:hover { background: rgba(50, 47, 80, 0.6); }
body.dark .btn-mem {
  background: rgba(35, 33, 55, 0.4);
  color: rgba(160, 155, 200, 0.65);
}
body.dark .btn-mem:hover { background: rgba(50, 47, 75, 0.55); }
body.dark .history-panel {
  background: rgba(14, 12, 28, 0.96);
  border-left: 1px solid rgba(255,255,255,0.04);
}
body.dark .hist-item:hover { background: rgba(255,255,255,0.04); }
body.dark .toolbar-btn { color: rgba(180,175,210,0.6); }
body.dark .toolbar-btn:hover { background: rgba(255,255,255,0.06); color: #e8e6f0; }
body.dark .separator { background: rgba(255,255,255,0.04); }
body.dark .ripple-ink { background: rgba(255,255,255,0.12); }
body.dark .toast { background: rgba(45,42,70,0.96); color: #f0eef8; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
body.dark .hist-header { border-bottom: 1px solid rgba(255,255,255,0.04); }

/* ── Light Theme ─────────────────────────────────── */
body.light {
  background: linear-gradient(140deg, #e8ecf4 0%, #d5dbe8 40%, #e2e8f0 100%);
  color: #1a1a2e;
}
body.light .calc {
  background: rgba(255, 255, 255, 0.78);
  box-shadow: 0 30px 80px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.8);
  backdrop-filter: blur(50px) saturate(1.4);
  -webkit-backdrop-filter: blur(50px) saturate(1.4);
}
body.light .display-area {
  background: rgba(235, 238, 248, 0.75);
  box-shadow: inset 0 3px 12px rgba(0,0,0,0.04), inset 0 0 0 1px rgba(0,0,0,0.04);
}
body.light .expr { color: rgba(80, 75, 120, 0.5); }
body.light .result-text { color: #1a1a2e; }
body.light .btn-num {
  background: rgba(255, 255, 255, 0.85);
  color: #1a1a2e;
}
body.light .btn-num:hover { background: rgba(255, 255, 255, 0.98); }
body.light .btn-op {
  background: rgba(215, 210, 240, 0.75);
  color: #5a4bcf;
}
body.light .btn-op:hover { background: rgba(205, 198, 238, 0.9); }
body.light .btn-fn {
  background: rgba(230, 232, 245, 0.8);
  color: rgba(70, 65, 110, 0.78);
}
body.light .btn-fn:hover { background: rgba(222, 224, 242, 0.95); }
body.light .btn-sci {
  background: rgba(235, 237, 250, 0.75);
  color: rgba(80, 75, 120, 0.72);
}
body.light .btn-sci:hover { background: rgba(225, 227, 245, 0.92); }
body.light .btn-mem {
  background: rgba(238, 240, 250, 0.7);
  color: rgba(90, 85, 130, 0.6);
}
body.light .btn-mem:hover { background: rgba(228, 230, 248, 0.88); }
body.light .history-panel {
  background: rgba(245, 247, 253, 0.98);
  border-left: 1px solid rgba(0,0,0,0.05);
}
body.light .hist-item:hover { background: rgba(0,0,0,0.03); }
body.light .toolbar-btn { color: rgba(80,75,120,0.55); }
body.light .toolbar-btn:hover { background: rgba(0,0,0,0.04); color: #1a1a2e; }
body.light .separator { background: rgba(0,0,0,0.05); }
body.light .ripple-ink { background: rgba(0,0,0,0.07); }
body.light .toast { background: rgba(255,255,255,0.98); color: #1a1a2e; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
body.light .hist-header { border-bottom: 1px solid rgba(0,0,0,0.06); }

/* ── Calculator Shell ────────────────────────────── */
.calc-wrap {
  position: relative;
  width: 370px;
  max-width: 96vw;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.calc-wrap.sci-mode { width: 480px; }

.calc {
  position: relative;
  border-radius: 28px;
  overflow: hidden;
  transition: background 0.5s, box-shadow 0.5s;
}

/* ── Toolbar ─────────────────────────────────────── */
.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px 2px;
}
.tb-left, .tb-right { display: flex; align-items: center; gap: 4px; }

.toolbar-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.4px;
  transition: background 0.2s, color 0.2s, transform 0.12s;
  font-family: inherit;
}
.toolbar-btn:hover { transform: scale(1.06); }
.toolbar-btn:active { transform: scale(0.96); }
.toolbar-btn.active { color: var(--accent) !important; }

.deg-rad {
  display: inline-flex;
  border-radius: 7px;
  overflow: hidden;
  gap: 0;
}
body.dark .deg-rad { background: rgba(255,255,255,0.05); }
body.light .deg-rad { background: rgba(0,0,0,0.05); }
.deg-rad .toolbar-btn { padding: 4px 10px; font-size: 11px; border-radius: 6px; }
.deg-rad .toolbar-btn.active { background: var(--accent); color: #fff !important; }

.theme-icon { font-size: 16px; padding: 5px 8px; }

/* ── Display ─────────────────────────────────────── */
.display-area {
  margin: 4px 12px;
  border-radius: 18px;
  padding: 14px 18px 10px;
  min-height: 115px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  position: relative;
  transition: background 0.5s, box-shadow 0.5s;
}

.mem-badge {
  position: absolute;
  top: 12px;
  left: 16px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.8px;
  opacity: 0;
  transition: opacity 0.35s;
  color: var(--accent);
}
.mem-badge.show { opacity: 0.6; }

.copy-btn {
  position: absolute;
  top: 10px;
  right: 12px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 5px 6px;
  border-radius: 7px;
  opacity: 0;
  transition: opacity 0.25s, background 0.2s, transform 0.12s;
  font-size: 15px;
  line-height: 1;
}
.display-area:hover .copy-btn { opacity: 0.5; }
.copy-btn:hover { opacity: 1 !important; transform: scale(1.15); }
body.dark .copy-btn:hover { background: rgba(255,255,255,0.08); }
body.light .copy-btn:hover { background: rgba(0,0,0,0.05); }
.copy-btn.copied { opacity: 1 !important; color: #00cec9; }

.expr {
  font-size: 15px;
  text-align: right;
  min-height: 22px;
  line-height: 1.45;
  overflow-x: auto;
  white-space: nowrap;
  scrollbar-width: none;
  transition: color 0.3s;
  padding-right: 2px;
}
.expr::-webkit-scrollbar { display: none; }

.result-text {
  font-size: 44px;
  font-weight: 280;
  text-align: right;
  line-height: 1.15;
  overflow-x: auto;
  white-space: nowrap;
  scrollbar-width: none;
  letter-spacing: -1.2px;
  padding-right: 2px;
  transition: color 0.3s;
  font-variant-numeric: tabular-nums;
}
.result-text::-webkit-scrollbar { display: none; }
.result-text.pop { animation: pop-in 0.18s ease; }

@keyframes pop-in {
  0% { transform: scale(1); }
  50% { transform: scale(1.025); }
  100% { transform: scale(1); }
}

/* ── Button Grid ─────────────────────────────────── */
.grid-wrap { padding: 6px 10px 4px; }
.grid-wrap:last-child { padding-bottom: 12px; }

.btn-grid {
  display: grid;
  gap: 6px;
}
.main-grid { grid-template-columns: repeat(4, 1fr); }
.sci-grid { grid-template-columns: repeat(5, 1fr); }
.mem-grid { grid-template-columns: repeat(4, 1fr); gap: 4px; }

.separator {
  height: 1px;
  margin: 2px 14px;
  transition: background 0.4s;
}

/* ── Buttons ─────────────────────────────────────── */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  border-radius: 14px;
  font-size: 19px;
  font-weight: 500;
  cursor: pointer;
  height: 52px;
  transition: background 0.12s, transform 0.08s, box-shadow 0.12s, color 0.2s;
  position: relative;
  overflow: hidden;
  font-family: inherit;
  letter-spacing: 0.1px;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}
.btn:focus-visible { box-shadow: 0 0 0 3px var(--accent-glow); z-index: 2; }
.btn:active { transform: scale(0.91); transition-duration: 0.04s; }

.btn-fn { font-size: 15px; font-weight: 600; }
.btn-sci { font-size: 13px; font-weight: 600; height: 46px; border-radius: 12px; }
.btn-mem { font-size: 12px; font-weight: 700; height: 40px; border-radius: 10px; letter-spacing: 0.5px; }
.btn-fn.danger { color: var(--danger) !important; }

.btn-eq {
  background: var(--accent) !important;
  color: #fff !important;
  font-size: 26px;
  font-weight: 600;
  box-shadow: 0 4px 18px var(--accent-glow);
}
.btn-eq:hover { background: var(--accent-hover) !important; box-shadow: 0 6px 24px var(--accent-glow); }
.btn-eq:active { background: var(--accent-press) !important; }

.span-2 { grid-column: span 2; }

.ripple-ink {
  position: absolute;
  border-radius: 50%;
  transform: scale(0);
  animation: ripple-go 0.45s ease-out;
  pointer-events: none;
}
@keyframes ripple-go {
  to { transform: scale(3.5); opacity: 0; }
}

/* ── Scientific Panel ────────────────────────────── */
.sci-panel {
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.35s;
  max-height: 0;
  opacity: 0;
}
.sci-panel.open { max-height: 200px; opacity: 1; }

/* ── History Panel ───────────────────────────────── */
.history-panel {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 280px;
  border-radius: 0 28px 28px 0;
  backdrop-filter: blur(50px);
  -webkit-backdrop-filter: blur(50px);
  transform: translateX(102%);
  transition: transform 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.38s;
  opacity: 0;
  z-index: 20;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.history-panel.open { transform: translateX(0); opacity: 1; }

.hist-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 16px 12px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.3px;
}
.hist-header button {
  background: none;
  border: none;
  cursor: pointer;
  padding: 5px 10px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 700;
  font-family: inherit;
  transition: background 0.2s, color 0.2s;
}
body.dark .hist-header button { color: rgba(200,195,230,0.6); }
body.light .hist-header button { color: rgba(80,75,120,0.6); }
body.dark .hist-header button:hover { color: var(--danger); background: rgba(255,255,255,0.05); }
body.light .hist-header button:hover { color: var(--danger); background: rgba(0,0,0,0.04); }

.hist-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 10px 14px;
  scrollbar-width: thin;
}
body.dark .hist-list { scrollbar-color: rgba(255,255,255,0.08) transparent; }
body.light .hist-list { scrollbar-color: rgba(0,0,0,0.08) transparent; }
.hist-list::-webkit-scrollbar { width: 3px; }
.hist-list::-webkit-scrollbar-track { background: transparent; }
body.dark .hist-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
body.light .hist-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 2px; }

.hist-item {
  padding: 10px 12px;
  border-radius: 11px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  margin-bottom: 2px;
}
.hist-item:active { transform: scale(0.97); }

.hist-expr-text {
  font-size: 12px;
  opacity: 0.45;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 3px;
}
.hist-result-text {
  font-size: 19px;
  font-weight: 500;
  letter-spacing: -0.4px;
}
.hist-empty {
  text-align: center;
  padding: 40px 16px;
  opacity: 0.25;
  font-size: 13px;
}

/* ── Toast ───────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  padding: 9px 22px;
  border-radius: 11px;
  font-size: 13px;
  font-weight: 700;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 200;
  pointer-events: none;
  letter-spacing: 0.2px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Responsive ──────────────────────────────────── */
@media (max-width: 520px) {
  .calc-wrap, .calc-wrap.sci-mode { width: 100vw !important; max-width: 100vw; }
  .calc { border-radius: 0; }
  .history-panel { width: 100%; border-radius: 0; }
  .result-text { font-size: 38px; }
  .btn { height: 48px; font-size: 17px; border-radius: 12px; }
  .btn-sci { height: 42px; font-size: 12px; }
  .btn-mem { height: 36px; font-size: 11px; }
  .grid-wrap { padding: 4px 8px 2px; }
  .display-area { margin: 4px 8px; padding: 10px 14px 8px; min-height: 100px; }
}

@media (max-height: 680px) {
  .btn { height: 44px; }
  .btn-sci { height: 38px; }
  .btn-mem { height: 34px; }
  .display-area { min-height: 85px; padding: 8px 14px 6px; }
  .result-text { font-size: 34px; }
}
</style>
</head>
<body class="dark">

<div class="calc-wrap" id="calcWrap">
  <div class="calc" id="calc">

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="tb-left">
        <div class="deg-rad">
          <button class="toolbar-btn active" id="btnDeg" data-action="deg">DEG</button>
          <button class="toolbar-btn" id="btnRad" data-action="rad">RAD</button>
        </div>
        <button class="toolbar-btn" id="btnSci" data-action="sci">SCI</button>
      </div>
      <div class="tb-right">
        <button class="toolbar-btn" id="btnHist" data-action="hist" title="History">&#128339;</button>
        <button class="toolbar-btn theme-icon" id="btnTheme" data-action="theme" title="Toggle theme">&#9790;</button>
      </div>
    </div>

    <!-- Display -->
    <div class="display-area" id="displayArea">
      <span class="mem-badge" id="memBadge">M</span>
      <button class="copy-btn" id="copyBtn" title="Copy result">&#128203;</button>
      <div class="expr" id="exprEl"></div>
      <div class="result-text" id="resultEl">0</div>
    </div>

    <!-- Scientific Functions -->
    <div class="sci-panel" id="sciPanel">
      <div class="separator"></div>
      <div class="grid-wrap">
        <div class="btn-grid sci-grid" id="sciGrid"></div>
      </div>
    </div>

    <div class="separator"></div>

    <!-- Main Buttons -->
    <div class="grid-wrap">
      <div class="btn-grid main-grid" id="mainGrid"></div>
    </div>

    <!-- Memory Row -->
    <div class="grid-wrap">
      <div class="btn-grid mem-grid" id="memGrid"></div>
    </div>

    <!-- History Panel -->
    <div class="history-panel" id="histPanel">
      <div class="hist-header">
        <span>History</span>
        <button id="clearHistBtn">Clear All</button>
      </div>
      <div class="hist-list" id="histList"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
"use strict";

/* ================================================================
   STATE
   ================================================================ */
let expr = "";
let display = "0";
let evaluated = false;
let mem = 0;
let hasMem = false;
let angleDeg = true;
let sciOpen = false;
let histOpen = false;
let lastAns = 0;
let theme = localStorage.getItem("calc-theme") || "dark";
let hist = [];

try { hist = JSON.parse(localStorage.getItem("calc-hist") || "[]"); } catch(_) { hist = []; }

/* ================================================================
   DOM REFS
   ================================================================ */
const $ = id => document.getElementById(id);
const exprEl = $("exprEl");
const resultEl = $("resultEl");
const memBadge = $("memBadge");
const sciPanel = $("sciPanel");
const calcWrap = $("calcWrap");
const histPanel = $("histPanel");
const histList = $("histList");
const toastEl = $("toast");
const copyBtn = $("copyBtn");

/* ================================================================
   AUDIO — subtle click via Web Audio API
   ================================================================ */
let actx = null;
function ensureAudio() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
}

function tick(freq, vol, dur) {
  try {
    ensureAudio();
    const t = actx.currentTime;
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.frequency.setValueAtTime(freq, t);
    o.type = "sine";
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch(_) {}
}

const snd = {
  num: () => tick(880, 0.025, 0.06),
  op:  () => tick(660, 0.03, 0.06),
  fn:  () => tick(550, 0.02, 0.06),
  eq:  () => tick(1100, 0.04, 0.08),
  err: () => tick(220, 0.04, 0.15),
};

/* ================================================================
   BUTTON DEFINITIONS
   ================================================================ */
const sciButtons = [
  { label: "sin",  cls: "btn-sci", action: "sci", fn: "sin"   },
  { label: "cos",  cls: "btn-sci", action: "sci", fn: "cos"   },
  { label: "tan",  cls: "btn-sci", action: "sci", fn: "tan"   },
  { label: "log",  cls: "btn-sci", action: "sci", fn: "log"   },
  { label: "ln",   cls: "btn-sci", action: "sci", fn: "ln"    },
  { label: "\u221A",cls: "btn-sci", action: "sci", fn: "sqrt" },
  { label: "x\u00B2",cls:"btn-sci", action: "sci", fn: "sq"   },
  { label: "x\u00B3",cls:"btn-sci", action: "sci", fn: "cb"   },
  { label: "x\u207F",cls:"btn-sci", action: "sci", fn: "pow"  },
  { label: "x!",   cls: "btn-sci", action: "sci", fn: "fact"  },
  { label: "\u03C0",cls: "btn-sci", action: "sci", fn: "pi"   },
  { label: "e",    cls: "btn-sci", action: "sci", fn: "euler" },
  { label: "|x|",  cls: "btn-sci", action: "sci", fn: "abs"   },
  { label: "1/x",  cls: "btn-sci", action: "sci", fn: "inv"   },
  { label: "ANS",  cls: "btn-sci", action: "sci", fn: "ans"   },
];

const mainButtons = [
  { label: "AC",   cls: "btn-fn danger", action: "ac"      },
  { label: "\u232B",cls: "btn-fn",       action: "bksp"    },
  { label: "( )",  cls: "btn-fn",        action: "paren"   },
  { label: "\u00F7",cls: "btn-op",       action: "op", op: "\u00F7" },

  { label: "7",    cls: "btn-num", action: "num", val: "7" },
  { label: "8",    cls: "btn-num", action: "num", val: "8" },
  { label: "9",    cls: "btn-num", action: "num", val: "9" },
  { label: "\u00D7",cls: "btn-op", action: "op", op: "\u00D7" },

  { label: "4",    cls: "btn-num", action: "num", val: "4" },
  { label: "5",    cls: "btn-num", action: "num", val: "5" },
  { label: "6",    cls: "btn-num", action: "num", val: "6" },
  { label: "\u2212",cls: "btn-op", action: "op", op: "\u2212" },

  { label: "1",    cls: "btn-num", action: "num", val: "1" },
  { label: "2",    cls: "btn-num", action: "num", val: "2" },
  { label: "3",    cls: "btn-num", action: "num", val: "3" },
  { label: "+",    cls: "btn-op",  action: "op", op: "+"   },

  { label: "\u00B1",cls: "btn-fn", action: "negate"        },
  { label: "0",    cls: "btn-num", action: "num", val: "0" },
  { label: ".",    cls: "btn-num", action: "num", val: "." },
  { label: "=",    cls: "btn-eq",  action: "eq"            },
];

const memButtons = [
  { label: "MC",  cls: "btn-mem", action: "mc" },
  { label: "MR",  cls: "btn-mem", action: "mr" },
  { label: "M+",  cls: "btn-mem", action: "mp" },
  { label: "M\u2212", cls: "btn-mem", action: "mm" },
];

/* ================================================================
   BUILD BUTTON DOM
   ================================================================ */
function buildGrid(container, defs) {
  defs.forEach(d => {
    const b = document.createElement("button");
    b.className = "btn " + d.cls;
    b.textContent = d.label;
    b.dataset.action = d.action;
    if (d.fn) b.dataset.fn = d.fn;
    if (d.op) b.dataset.op = d.op;
    if (d.val) b.dataset.val = d.val;
    if (d.span) b.classList.add("span-" + d.span);
    container.appendChild(b);
  });
}

buildGrid($("sciGrid"), sciButtons);
buildGrid($("mainGrid"), mainButtons);
buildGrid($("memGrid"), memButtons);

/* ================================================================
   RIPPLE
   ================================================================ */
function spawnRipple(btn, e) {
  const rect = btn.getBoundingClientRect();
  const sz = Math.max(rect.width, rect.height) * 1.2;
  const ink = document.createElement("span");
  ink.className = "ripple-ink";
  ink.style.width = ink.style.height = sz + "px";
  const cx = (e.clientX || (rect.left + rect.width/2)) - rect.left - sz/2;
  const cy = (e.clientY || (rect.top + rect.height/2)) - rect.top - sz/2;
  ink.style.left = cx + "px";
  ink.style.top = cy + "px";
  btn.appendChild(ink);
  ink.addEventListener("animationend", () => ink.remove());
}

/* ================================================================
   UNIFIED CLICK HANDLER
   ================================================================ */
document.querySelector(".calc").addEventListener("pointerdown", function(e) {
  const btn = e.target.closest(".btn, .toolbar-btn");
  if (!btn) return;

  if (btn.classList.contains("btn")) spawnRipple(btn, e);

  const action = btn.dataset.action;
  if (!action) return;

  switch (action) {
    case "num":   handleNum(btn.dataset.val); break;
    case "op":    handleOp(btn.dataset.op);   break;
    case "eq":    handleEq();                 break;
    case "ac":    handleAC();                 break;
    case "bksp":  handleBksp();               break;
    case "paren": handleParen();              break;
    case "negate":handleNegate();             break;
    case "sci":   handleSci(btn.dataset.fn);  break;
    case "mc":    memClear();                 break;
    case "mr":    memRecall();                break;
    case "mp":    memAdd();                   break;
    case "mm":    memSub();                   break;
    case "deg":   setAngle(true);             break;
    case "rad":   setAngle(false);            break;
    case "sciT":  toggleSci();                break;
    case "hist":  toggleHist();               break;
    case "theme": toggleTheme();              break;
  }
});

$("btnSci").addEventListener("pointerdown", () => toggleSci());
$("btnHist").addEventListener("pointerdown", () => toggleHist());
$("btnTheme").addEventListener("pointerdown", () => toggleTheme());
$("btnDeg").addEventListener("pointerdown", () => setAngle(true));
$("btnRad").addEventListener("pointerdown", () => setAngle(false));
$("copyBtn").addEventListener("pointerdown", () => doCopy());
$("clearHistBtn").addEventListener("click", () => clearHist());

/* ================================================================
   DISPLAY
   ================================================================ */
function render() {
  exprEl.textContent = expr;
  resultEl.textContent = display;
  memBadge.classList.toggle("show", hasMem);
  exprEl.scrollLeft = exprEl.scrollWidth;
  resultEl.scrollLeft = resultEl.scrollWidth;
}

function popResult() {
  resultEl.classList.remove("pop");
  void resultEl.offsetWidth;
  resultEl.classList.add("pop");
}

/* ================================================================
   NUMBER FORMATTING
   ================================================================ */
function fmt(n) {
  if (typeof n === "string") return n;
  if (!isFinite(n) || isNaN(n)) return "Error";
  let r = parseFloat(n.toPrecision(12));
  if (Object.is(r, -0)) r = 0;
  if (Math.abs(r) >= 1e15 || (Math.abs(r) < 1e-10 && r !== 0)) {
    return r.toExponential(8);
  }
  let s = String(r);
  let parts = s.split(".");
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  return parts.join(".");
}

function raw(s) { return s.replace(/,/g, ""); }

/* ================================================================
   INPUT HANDLERS
   ================================================================ */
function handleNum(v) {
  snd.num();
  if (evaluated) {
    if (v === ".") { expr = ""; display = "0."; }
    else { expr = ""; display = v; }
    evaluated = false;
    render(); return;
  }
  if (v === ".") {
    let c = raw(display);
    if (c.includes(".")) return;
    display = display + ".";
  } else {
    let c = raw(display);
    if (c === "0" || display === "Error") { display = v; }
    else {
      if (c.replace(/[^0-9]/g,"").length >= 15) return;
      c += v;
      if (!c.includes(".")) {
        display = Number(c).toLocaleString("en-US");
      } else {
        let p = c.split(".");
        display = Number(p[0]).toLocaleString("en-US") + "." + p[1];
      }
    }
  }
  render();
}

function handleOp(op) {
  snd.op();
  if (evaluated) {
    expr = raw(display) + " " + op + " ";
    display = "0";
    evaluated = false;
    render(); return;
  }
  let c = raw(display);
  if (c !== "0" && c !== "" && display !== "Error") {
    expr += c + " " + op + " ";
    display = "0";
  } else if (expr.length > 0) {
    expr = expr.replace(/\s*[\+\u2212\u00D7\u00F7]\s*$/, "") + " " + op + " ";
  }
  render();
}

function handleEq() {
  snd.eq();
  let c = raw(display);
  let full = expr + ((c !== "0" || !expr.trim()) ? c : "");
  if (!full.trim()) return;

  let result = safeEval(full);
  let exprSnapshot = full;

  if (!isFinite(result) || isNaN(result)) {
    snd.err();
    display = "Error";
  } else {
    lastAns = result;
    display = fmt(result);
  }
  expr = exprSnapshot + " =";
  evaluated = true;
  popResult();
  render();
  if (display !== "Error") pushHist(exprSnapshot, display);
}

function handleAC() {
  snd.fn();
  expr = ""; display = "0"; evaluated = false;
  render();
}

function handleBksp() {
  snd.fn();
  if (evaluated) { expr = ""; display = "0"; evaluated = false; render(); return; }
  if (display === "0" || display === "Error") { render(); return; }
  let c = raw(display);
  c = c.slice(0, -1);
  if (!c || c === "-") c = "0";
  if (!c.includes(".")) {
    display = Number(c).toLocaleString("en-US");
  } else {
    let p = c.split(".");
    display = Number(p[0]).toLocaleString("en-US") + "." + p[1];
  }
  render();
}

function countCh(s, ch) { let n=0; for(let i=0;i<s.length;i++) if(s[i]===ch) n++; return n; }

function handleParen() {
  snd.fn();
  let opens = countCh(expr, "(");
  let closes = countCh(expr, ")");
  let c = raw(display);
  let last = expr.trim().slice(-1);

  if (opens > closes && c !== "0" && last !== "(" && last !== "+" &&
      last !== "\u2212" && last !== "\u00D7" && last !== "\u00F7") {
    expr += c + ")";
    display = "0";
  } else {
    expr += "(";
  }
  evaluated = false;
  render();
}

function handleNegate() {
  snd.fn();
  let c = raw(display);
  if (c === "0") return;
  if (c.startsWith("-")) c = c.slice(1);
  else c = "-" + c;
  if (!c.includes(".")) {
    display = Number(c).toLocaleString("en-US");
  } else {
    let p = c.split(".");
    display = Number(p[0]).toLocaleString("en-US") + "." + (p[1] || "");
  }
  render();
}

/* ================================================================
   SCIENTIFIC FUNCTIONS
   ================================================================ */
function toRad(d) { return d * Math.PI / 180; }

function factorial(n) {
  if (n < 0) return NaN;
  if (n === 0 || n === 1) return 1;
  if (n > 170) return Infinity;
  if (!Number.isInteger(n)) return gammaFn(n + 1);
  let r = 1; for (let i = 2; i <= n; i++) r *= i; return r;
}

function gammaFn(z) {
  if (z < 0.5) return Math.PI / (Math.sin(Math.PI * z) * gammaFn(1 - z));
  z -= 1;
  const c = [0.99999999999980993,676.5203681218851,-1259.1392167224028,
    771.32342877765313,-176.61502916214059,12.507343278686905,
    -0.13857109526572012,9.9843695780195716e-6,1.5056327351493116e-7];
  let x = c[0];
  for (let i = 1; i < 9; i++) x += c[i] / (z + i);
  const t = z + 7.5;
  return Math.sqrt(2 * Math.PI) * Math.pow(t, z + 0.5) * Math.exp(-t) * x;
}

function handleSci(fn) {
  snd.fn();
  let c = raw(display);
  let v = parseFloat(c);
  let r;

  switch (fn) {
    case "sin":
      r = angleDeg ? Math.sin(toRad(v)) : Math.sin(v);
      expr = "sin(" + c + (angleDeg ? "\u00B0" : "") + ")";
      break;
    case "cos":
      r = angleDeg ? Math.cos(toRad(v)) : Math.cos(v);
      expr = "cos(" + c + (angleDeg ? "\u00B0" : "") + ")";
      break;
    case "tan":
      r = angleDeg ? Math.tan(toRad(v)) : Math.tan(v);
      expr = "tan(" + c + (angleDeg ? "\u00B0" : "") + ")";
      break;
    case "log":
      r = Math.log10(v);
      expr = "log(" + c + ")";
      break;
    case "ln":
      r = Math.log(v);
      expr = "ln(" + c + ")";
      break;
    case "sqrt":
      r = Math.sqrt(v);
      expr = "\u221A(" + c + ")";
      break;
    case "sq":
      r = v * v;
      expr = "(" + c + ")\u00B2";
      break;
    case "cb":
      r = v * v * v;
      expr = "(" + c + ")\u00B3";
      break;
    case "pow":
      expr += c + "^";
      display = "0";
      evaluated = false;
      render();
      return;
    case "fact":
      r = factorial(v);
      expr = c + "!";
      break;
    case "pi":
      display = fmt(Math.PI);
      evaluated = false;
      render();
      return;
    case "euler":
      display = fmt(Math.E);
      evaluated = false;
      render();
      return;
    case "abs":
      r = Math.abs(v);
      expr = "|" + c + "|";
      break;
    case "inv":
      r = v === 0 ? NaN : 1 / v;
      expr = "1/(" + c + ")";
      break;
    case "ans":
      display = fmt(lastAns);
      evaluated = false;
      render();
      return;
  }

  if (!isFinite(r) || isNaN(r)) { snd.err(); display = "Error"; }
  else display = fmt(r);
  evaluated = true;
  popResult();
  render();
}

/* ================================================================
   EXPRESSION EVALUATOR
   ================================================================ */
function safeEval(input) {
  let e = input.trim().replace(/,/g, "");
  if (!e) return NaN;

  let opens = countCh(e, "("), closes = countCh(e, ")");
  while (closes < opens) { e += ")"; closes++; }

  e = e.replace(/\u00D7/g, "*")
       .replace(/\u00F7/g, "/")
       .replace(/\u2212/g, "-");

  // Handle ^ for power (right-associative)
  e = handlePow(e);

  // Implicit multiplication: number followed by (
  e = e.replace(/(\d)\s*\(/g, "$1*(");
  // )(  =>  )*(
  e = e.replace(/\)\s*\(/g, ")*(");

  try {
    return new Function("return (" + e + ")")();
  } catch(_) {
    return NaN;
  }
}

function handlePow(e) {
  // Replace a^b patterns, handling nested parens
  const re = /([\d.]+|\([^)]*\))\s*\^\s*([\d.]+|\([^)]*\))/;
  let safety = 0;
  while (re.test(e) && safety++ < 20) {
    e = e.replace(re, "Math.pow($1,$2)");
  }
  return e;
}

/* ================================================================
   MEMORY
   ================================================================ */
function memClear() { snd.fn(); mem = 0; hasMem = false; render(); toast("Memory cleared"); }
function memRecall() {
  snd.fn();
  if (!hasMem) return;
  display = fmt(mem);
  evaluated = false;
  render();
}
function memAdd() {
  snd.fn();
  let v = parseFloat(raw(display));
  if (isNaN(v)) return;
  mem += v; hasMem = true; render();
  toast("M+ \u2192 " + fmt(mem));
}
function memSub() {
  snd.fn();
  let v = parseFloat(raw(display));
  if (isNaN(v)) return;
  mem -= v; hasMem = true; render();
  toast("M\u2212 \u2192 " + fmt(mem));
}

/* ================================================================
   ANGLE MODE
   ================================================================ */
function setAngle(deg) {
  snd.fn();
  angleDeg = deg;
  $("btnDeg").classList.toggle("active", deg);
  $("btnRad").classList.toggle("active", !deg);
}

/* ================================================================
   SCI TOGGLE
   ================================================================ */
function toggleSci() {
  snd.fn();
  sciOpen = !sciOpen;
  sciPanel.classList.toggle("open", sciOpen);
  calcWrap.classList.toggle("sci-mode", sciOpen);
  $("btnSci").classList.toggle("active", sciOpen);
}

/* ================================================================
   THEME
   ================================================================ */
function applyTheme() {
  document.body.className = theme;
  $("btnTheme").innerHTML = theme === "dark" ? "&#9790;" : "&#9728;&#65039;";
  localStorage.setItem("calc-theme", theme);
}
function toggleTheme() {
  snd.fn();
  theme = theme === "dark" ? "light" : "dark";
  applyTheme();
}
applyTheme();

/* ================================================================
   HISTORY
   ================================================================ */
function pushHist(expression, result) {
  hist.unshift({ e: expression, r: result, t: Date.now() });
  if (hist.length > 50) hist.pop();
  try { localStorage.setItem("calc-hist", JSON.stringify(hist)); } catch(_) {}
  renderHist();
}

function renderHist() {
  if (!hist.length) {
    histList.innerHTML = '<div class="hist-empty">No calculations yet</div>';
    return;
  }
  histList.innerHTML = hist.map((h, i) => {
    let esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    return '<div class="hist-item" data-idx="' + i + '">' +
      '<div class="hist-expr-text">' + esc(h.e) + '</div>' +
      '<div class="hist-result-text">' + esc(h.r) + '</div>' +
    '</div>';
  }).join("");
}

histList.addEventListener("click", function(e) {
  const item = e.target.closest(".hist-item");
  if (!item) return;
  snd.fn();
  const idx = parseInt(item.dataset.idx);
  const h = hist[idx];
  if (!h) return;
  display = h.r;
  expr = "";
  evaluated = true;
  popResult();
  render();
});

function clearHist() {
  snd.fn();
  hist = [];
  localStorage.setItem("calc-hist", "[]");
  renderHist();
}

function toggleHist() {
  snd.fn();
  histOpen = !histOpen;
  histPanel.classList.toggle("open", histOpen);
  $("btnHist").classList.toggle("active", histOpen);
}

renderHist();

/* ================================================================
   COPY
   ================================================================ */
function doCopy() {
  snd.fn();
  let txt = raw(display);
  if (!navigator.clipboard) return;
  navigator.clipboard.writeText(txt).then(() => {
    copyBtn.classList.add("copied");
    copyBtn.textContent = "\u2713";
    toast("Copied!");
    setTimeout(() => { copyBtn.classList.remove("copied"); copyBtn.innerHTML = "&#128203;"; }, 1500);
  });
}

/* ================================================================
   TOAST
   ================================================================ */
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  setTimeout(() => toastEl.classList.remove("show"), 1800);
}

/* ================================================================
   KEYBOARD
   ================================================================ */
document.addEventListener("keydown", function(e) {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const k = e.key;

  if (k >= "0" && k <= "9") { e.preventDefault(); handleNum(k); pulseBtn(k); return; }
  if (k === ".") { e.preventDefault(); handleNum("."); return; }
  if (k === "+") { e.preventDefault(); handleOp("+"); return; }
  if (k === "-") { e.preventDefault(); handleOp("\u2212"); return; }
  if (k === "*") { e.preventDefault(); handleOp("\u00D7"); return; }
  if (k === "/") { e.preventDefault(); handleOp("\u00F7"); return; }
  if (k === "Enter" || k === "=") { e.preventDefault(); handleEq(); return; }
  if (k === "Backspace") { e.preventDefault(); handleBksp(); return; }
  if (k === "Escape") { e.preventDefault(); handleAC(); return; }
  if (k === "(" || k === ")") { e.preventDefault(); handleParen(); return; }
  if (k === "%") {
    e.preventDefault();
    snd.fn();
    let c = raw(display), v = parseFloat(c);
    if (!isNaN(v)) { display = fmt(v / 100); popResult(); render(); }
    return;
  }
});

function pulseBtn(val) {
  document.querySelectorAll(".btn").forEach(b => {
    if (b.textContent.trim() === val) {
      b.style.transform = "scale(0.91)";
      setTimeout(() => { b.style.transform = ""; }, 90);
    }
  });
}

/* ================================================================
   INIT
   ================================================================ */
render();

})();
</script>
